# ============================================================================
# Lucifex — Alembic Configuration
# ============================================================================
# Alembic is the migration tool for SQLAlchemy. This file points Alembic at
# the migration script directory and configures the basic runtime behavior.
#
# The actual database URL is NOT stored here — it is loaded at runtime from
# environment variables in env.py. This keeps secrets out of the repo and
# allows different environments (local, staging, production) to point at
# different databases without editing this file.
# ============================================================================

[alembic]
# Path to migration scripts, relative to this file.
script_location = src/lucifex/db/migrations

# Template for new migration filenames. UTC timestamp prefix gives lexical
# ordering by creation time, which matches actual creation order even
# across machines and time zones.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Use UTC for the timestamp prefix.
timezone = UTC

# Truncate slug after this many characters.
truncate_slug_length = 40

# Output line length for migration files.
output_encoding = utf-8

# Database URL is set in env.py from the LUCIFEX_DATABASE_URL environment variable.
# Do NOT put a real URL here — secrets do not belong in this file.
sqlalchemy.url = driver://user:pass@host/dbname

# ----------------------------------------------------------------------------
# Logging configuration
# ----------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
